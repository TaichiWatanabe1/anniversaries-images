name: Build and deploy Python project to Azure Function App - anniversaries-images

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.'
  PYTHON_VERSION: '3.13'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies into function package
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Verify Azure Blob SDK import
        run: |
          python - <<'PY'
          import sys
          sys.path.insert(0, ".python_packages/lib/site-packages")
          from azure.identity import DefaultAzureCredential
          from azure.storage.blob import BlobServiceClient
          print("azure.identity and azure.storage.blob import ok")
          PY

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A8D1AD9FECEA471CB0219259F0A78C6F }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4F3CA4F0D3EC4CEDACF724F289E617CE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_986BA43965814DC8BDDC9FD129E87750 }}

      - name: 'Deploy to Azure Functions'
        uses: Azure/functions-action@v1
        id: deploy-to-function
        with:
          app-name: 'anniversaries-images'
          slot-name: 'Production'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          scm-do-build-during-deployment: false
          enable-oryx-build: false
          
